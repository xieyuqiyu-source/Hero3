/api/v1/admin/accounts:
  get:
    tags:
    - Admin
    summary: GM 查看所有注册账号和存档
    operationId: adminListAccounts
    responses:
      '200':
        description: 账号和存档列表
        content:
          application/json:
            schema:
              type: object
              required:
              - accounts
              properties:
                accounts:
                  type: array
                  items:
                    $ref: '#/components/schemas/AccountSummary'
      '500':
        description: 后端读取失败
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
/api/v1/admin/players/{playerId}/state:
  get:
    tags:
    - Admin
    summary: GM 查看指定玩家完整状态
    operationId: adminGetPlayerState
    parameters:
    - name: playerId
      in: path
      required: true
      schema:
        type: string
        example: player_47f23e0eeb08ab50402fedfc
    responses:
      '200':
        description: 玩家完整游戏状态
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameState'
      '404':
        description: 玩家不存在
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
/api/v1/admin/resources/adjust:
  post:
    tags:
    - Admin
    summary: GM 资源补发 / 扣减
    description: 对指定玩家的资源进行加减调整。正数为补发，负数为扣减（不会低于 0，不会超过容量上限）。
    operationId: adminAdjustResources
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AdjustResourcesRequest'
    responses:
      '200':
        description: 调整后的游戏状态
        content:
          application/json:
            schema:
              type: object
              required:
              - state
              properties:
                state:
                  $ref: '#/components/schemas/GameState'
      '400':
        description: 参数错误
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: 玩家不存在
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
/api/v1/admin/balance:
  get:
    tags:
    - Admin
    summary: GM 读取游戏数值配置
    operationId: adminGetBalance
    responses:
      '200':
        description: 当前资源和建筑数值配置
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BalanceConfig'
  put:
    tags:
    - Admin
    summary: GM 保存游戏数值配置
    operationId: adminUpdateBalance
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BalanceConfig'
    responses:
      '200':
        description: 保存后的数值配置
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BalanceConfig'
      '400':
        description: 配置格式或内容不合法
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
/api/v1/admin/npc-config:
  get:
    tags:
    - Admin
    summary: GM 读取 NPC 城池配置
    description: 读取 NPC 城池生成、刷新、守军、词条和侦查消耗配置。
    operationId: adminGetNpcConfig
    responses:
      '200':
        description: 当前 NPC 城池配置
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NpcConfig'
  put:
    tags:
    - Admin
    summary: GM 保存 NPC 城池配置
    description: 保存后立即更新后端内存配置。已生成到玩家存档内的 NPC 城池不会自动重刷，需要调用 NPC 刷新接口才会按新配置重新生成。
    operationId: adminUpdateNpcConfig
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NpcConfig'
    responses:
      '200':
        description: 保存后的 NPC 城池配置
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NpcConfig'
      '400':
        description: 配置格式或内容不合法
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
