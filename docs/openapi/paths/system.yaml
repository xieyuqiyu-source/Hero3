/healthz:
  get:
    tags:
    - System
    summary: 健康检查
    operationId: getHealth
    responses:
      '200':
        description: 服务正常
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthState'
/api/v1/meta:
  get:
    tags:
    - System
    summary: 服务元信息
    operationId: getMeta
    responses:
