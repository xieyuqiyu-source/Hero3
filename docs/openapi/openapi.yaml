openapi: 3.0.3
info:
  title: Hero3 API
  version: 0.1.0
  description: Hero3 当前 MVP 阶段的后端接口文档，可导入 Apifox。
servers:
- url: http://localhost:8080
  description: 本地 Go 后端
- url: http://124.223.111.163:8080
  description: 服务器后端占位，部署后按实际端口调整
tags:
- name: System
  description: 服务状态
- name: Game
  description: 游戏状态
- name: Account
  description: 轻账号与存档
- name: City
  description: 城池建设
- name: Admin
  description: GM 后台接口
