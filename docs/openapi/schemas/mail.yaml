MailAttachment:
  type: object
  required:
  - type
  - itemId
  - amount
  properties:
    type:
      type: string
      enum: [resource, city_gold, gold]
      example: resource
    itemId:
      type: string
      enum: [wood, stone, iron, food, city_gold, gold]
      example: wood
    amount:
      type: integer
      minimum: 1
      example: 1000
    metadata:
      type: object
      additionalProperties: true
Mail:
  type: object
  required:
  - id
  - playerId
  - mailType
  - senderType
  - senderName
  - title
  - content
  - isRead
  - isClaimed
  - createdAt
  properties:
    id:
      type: string
      example: mail_47f23e0eeb08ab50402fedfc
    playerId:
      type: string
      example: player_47f23e0eeb08ab50402fedfc
    mailType:
      type: string
      enum: [gm_notice, compensation, reward, event_reward, system_notice, player_message]
    senderType:
      type: string
      enum: [system, gm, player]
    senderId:
      type: string
    senderName:
      type: string
      example: Hero3 GM
    title:
      type: string
      example: GM 通知
    content:
      type: string
      example: 这里是信函正文。
    attachments:
      type: array
      items:
        $ref: '#/components/schemas/MailAttachment'
    sourceType:
      type: string
      enum: [manual, compensation, activity, system, player]
      example: manual
    sourceId:
      type: string
    isRead:
      type: boolean
    isClaimed:
      type: boolean
    deletedByPlayer:
      type: boolean
    expiresAt:
      type: string
      format: date-time
    createdAt:
      type: string
      format: date-time
    readAt:
      type: string
      format: date-time
    claimedAt:
      type: string
      format: date-time
MailPage:
  type: object
  required:
  - mails
  - page
  - pageSize
  - total
  - unread
  properties:
    mails:
      type: array
      items:
        $ref: '#/components/schemas/Mail'
    page:
      type: integer
      example: 1
    pageSize:
      type: integer
      example: 10
    total:
      type: integer
      example: 12
    unread:
      type: integer
      example: 2
SendMailRequest:
  type: object
  required:
  - playerId
  - title
  - content
  properties:
    playerId:
      type: string
    mailType:
      type: string
      enum: [gm_notice, compensation, reward, event_reward, system_notice]
      default: gm_notice
    title:
      type: string
      maxLength: 60
    content:
      type: string
      maxLength: 5000
    attachments:
      type: array
      items:
        $ref: '#/components/schemas/MailAttachment'
    sourceType:
      type: string
      enum: [manual, compensation, activity, system, player]
      default: manual
    sourceId:
      type: string
    expiresAt:
      type: string
      format: date-time
SendPlayerMailRequest:
  type: object
  required:
  - senderPlayerId
  - recipient
  - title
  - content
  properties:
    senderPlayerId:
      type: string
      example: player_47f23e0eeb08ab50402fedfc
    recipient:
      type: string
      description: 收件人地址，格式为 玩家昵称#六位编号。
      example: 主公#482193
    title:
      type: string
      maxLength: 60
      example: 你好
    content:
      type: string
      maxLength: 5000
      example: 这里是玩家信函正文。
MailClaimResult:
  type: object
  required:
  - mail
  - resources
  - cityGold
  - grantedItems
  properties:
    mail:
      $ref: '#/components/schemas/Mail'
    resources:
      $ref: '#/components/schemas/ResourceState'
    cityGold:
      type: integer
      example: 1200
    accountGold:
      type: integer
      description: 如果附件包含账号金币，则返回账号金币最新余额。
      example: 100
    grantedItems:
      type: object
      description: 本次实际发放的奖励汇总，key 为附件类型或资源类型。
      additionalProperties:
        type: integer
      example:
        wood: 1000
        city_gold: 50
