GameState:
  type: object
  required:
  - player
  - resources
  - resourceProduction
  - resourceSettledAt
  - buildings
  - army
  - recruitQueues
  - mapTargets
  - recentBattleReports
  - unreadMessageCount
  - serverTime
  properties:
    player:
      $ref: '#/components/schemas/Player'
    resources:
      $ref: '#/components/schemas/ResourceState'
    resourceProduction:
      $ref: '#/components/schemas/ResourceProduction'
    resourceSettledAt:
      type: string
      format: date-time
      description: 资源上次由后端权威结算的时间。
    buildings:
      type: array
      items:
        $ref: '#/components/schemas/Building'
    army:
      type: array
      items:
        $ref: '#/components/schemas/ArmyUnit'
    recruitQueues:
      type: array
      items:
        $ref: '#/components/schemas/RecruitQueue'
    npcState:
      nullable: true
      allOf:
      - $ref: '#/components/schemas/NpcState'
    mapTargets:
      type: array
      items:
        $ref: '#/components/schemas/MapTarget'
    recentBattleReports:
      type: array
      items:
        $ref: '#/components/schemas/BattleReport'
    unreadMessageCount:
      type: integer
      example: 0
    serverTime:
      type: string
      format: date-time
Player:
  type: object
  required:
  - id
  - nickname
  - faction
  properties:
    id:
      type: string
      example: demo-player
    nickname:
      type: string
      example: 主公
    faction:
      type: string
      example: wei
ResourceState:
  type: object
  required:
  - items
  - capacity
  properties:
    items:
      type: object
      description: 资源当前数量，key 为资源类型，可扩展。
      additionalProperties:
        type: integer
      example:
        wood: 1200
        stone: 900
        iron: 600
        food: 1500
    capacity:
      type: object
      description: 各资源容量上限，key 与资源类型一致。
      additionalProperties:
        type: integer
      example:
        wood: 7500
        stone: 7500
        iron: 7500
        food: 7500
ResourceProduction:
  type: object
  description: 每小时资源产量，key 为资源类型，可扩展。
  additionalProperties:
    type: integer
  example:
    wood: 84
    stone: 62
    iron: 48
    food: 100
Building:
  type: object
  required:
  - id
  - type
  - level
  - upgradeEndsAt
  properties:
    id:
      type: string
      example: wood-camp
    type:
      type: string
      example: wood_camp
    level:
      type: integer
      example: 3
    upgradeEndsAt:
      type: string
      nullable: true
      example: null
ArmyUnit:
  type: object
  required:
  - unitType
  - amount
  properties:
    unitType:
      type: string
      example: infantry
    amount:
      type: integer
      example: 80
RecruitQueue:
  type: object
  required:
  - id
  - unitType
  - amount
  - endsAt
  properties:
    id:
      type: string
    unitType:
      type: string
    amount:
      type: integer
    endsAt:
      type: string
      format: date-time
MapTarget:
  type: object
  required:
  - id
  - type
  - level
  - power
  - rewards
  properties:
    id:
      type: string
      example: target-001
    type:
      type: string
      example: bandit_camp
    level:
      type: integer
      example: 1
    power:
      type: integer
      example: 100
    rewards:
      type: object
      additionalProperties:
        type: integer
BattleReport:
  type: object
  properties:
    id:
      type: string
    targetId:
      type: string
    result:
      type: string
    playerPower:
      type: integer
    enemyPower:
      type: integer
    lostUnits:
      type: object
      additionalProperties:
        type: integer
    rewards:
      type: object
      additionalProperties:
        type: integer
    createdAt:
      type: string
      format: date-time
BalanceConfig:
  type: object
  required:
  - baseProduction
  - buildings
  properties:
    baseProduction:
      type: object
      additionalProperties:
        type: integer
      example:
        wood: 30
        stone: 30
        iron: 20
        food: 40
    buildings:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/BuildingConfig'
BuildingConfig:
  type: object
  required:
  - type
  - name
  properties:
    type:
      type: string
      example: wood_camp
    name:
      type: string
      example: 伐木场
    resourceType:
      type: string
      example: wood
    productionByLevel:
      type: array
      items:
        type: integer
      example:
      - 0
      - 18
      - 36
      - 54
    capacityByLevel:
      type: array
      items:
        type: integer
      example:
      - 5000
      - 7500
      - 10000
    upgradeCostByLevel:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          type: integer
      example:
        '1':
          wood: 50
          stone: 80
          iron: 30
          food: 20
    upgradeSecondsByLevel:
      type: object
      additionalProperties:
        type: integer
      example:
        '1': 30
        '2': 45
