openapi: 3.0.3
info:
  title: Hero3 API
  version: 0.1.0
  description: Hero3 当前 MVP 阶段的后端接口文档，可导入 Apifox。
servers:
- url: http://localhost:8080
  description: 本地 Go 后端
- url: http://124.223.111.163:8080
  description: 服务器后端占位，部署后按实际端口调整
tags:
- name: System
  description: 服务状态
- name: Game
  description: 游戏状态
- name: Account
  description: 轻账号与存档
- name: City
  description: 城池建设
- name: Military
  description: 军事与征兵
- name: Map
  description: 地图、NPC 城池与战斗
- name: Admin
  description: GM 后台接口
paths:
  /healthz:
    get:
      tags:
      - System
      summary: 健康检查
      operationId: getHealth
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthState'
  /api/v1/meta:
    get:
      tags:
      - System
      summary: 服务元信息
      operationId: getMeta
      responses:
        '200':
          description: 服务信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaState'
  /api/v1/game/bootstrap:
    get:
      tags:
      - Game
      summary: 游戏模块启动信息
      operationId: getGameBootstrap
      responses:
        '200':
          description: 游戏模块信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapResponse'
  /api/v1/game/state:
    get:
      tags:
      - Game
      summary: 获取游戏状态
      operationId: getGameState
      parameters:
      - name: playerId
        in: query
        required: false
        description: 玩家存档 ID；不传时返回 demo-player。
        schema:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
      responses:
        '200':
          description: 游戏状态快照
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '404':
          description: 玩家存档不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/accounts/register:
    post:
      tags:
      - Account
      summary: 注册轻账号
      operationId: registerAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSession'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 账号已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/accounts/login:
    post:
      tags:
      - Account
      summary: 登录轻账号
      operationId: loginAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSession'
        '401':
          description: 账号或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/accounts/{accountId}/players:
    get:
      tags:
      - Account
      summary: 查看账号绑定的存档
      operationId: listAccountPlayers
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
          example: acc_958538e3bc17faf00407ddcc
      responses:
        '200':
          description: 存档列表
          content:
            application/json:
              schema:
                type: object
                required:
                - players
                properties:
                  players:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlayerSummary'
        '404':
          description: 账号不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/accounts/{accountId}:
    delete:
      tags:
      - Account
      summary: 删除账号
      description: 删除账号，同时删除该账号关联的全部云存档。
      operationId: deleteAccount
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
          example: acc_958538e3bc17faf00407ddcc
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '404':
          description: 账号不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/players/create:
    post:
      tags:
      - Account
      summary: 创建账号绑定的游戏存档
      operationId: createPlayer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlayerRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                - playerId
                - state
                properties:
                  playerId:
                    type: string
                    example: player_47f23e0eeb08ab50402fedfc
                  state:
                    $ref: '#/components/schemas/GameState'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 账号不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/players/{playerId}:
    delete:
      tags:
      - Account
      summary: 删除云存档
      description: 删除指定 playerId 对应的云存档，不删除账号。
      operationId: deletePlayer
      parameters:
      - name: playerId
        in: path
        required: true
        schema:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '404':
          description: 存档不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/city/buildings/upgrade:
    post:
      tags:
      - City
      summary: 升级建筑
      description: 消耗资源发起建筑升级，升级完成前该建筑不可再次升级。
      operationId: upgradeBuilding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpgradeBuildingRequest'
      responses:
        '200':
          description: 升级已开始，返回更新后的游戏状态
          content:
            application/json:
              schema:
                type: object
                required:
                - state
                properties:
                  state:
                    $ref: '#/components/schemas/GameState'
        '404':
          description: 玩家或建筑不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 建筑正在升级中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 资源不足或已满级
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/city/buildings/upgrade-batch:
    post:
      tags:
      - City
      summary: 批量升级资源建筑
      description: 按等级从低到高依次尝试升级所有空闲资源建筑，直到资源耗尽。
      operationId: upgradeBuildingBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - playerId
              properties:
                playerId:
                  type: string
                  example: player_47f23e0eeb08ab50402fedfc
      responses:
        '200':
          description: 批量升级完成
          content:
            application/json:
              schema:
                type: object
                required:
                - state
                - upgraded
                properties:
                  state:
                    $ref: '#/components/schemas/GameState'
                  upgraded:
                    type: integer
                    description: 本次成功升级的建筑数量
                    example: 3
        '404':
          description: 玩家不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 资源不足，无法升级任何建筑
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/city/resources/fill:
    post:
      tags:
      - City
      summary: GM 填满资源
      description: 将指定玩家的所有资源填满到仓库容量上限。
      operationId: fillResources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - playerId
              properties:
                playerId:
                  type: string
                  example: player_47f23e0eeb08ab50402fedfc
      responses:
        '200':
          description: 资源已填满
          content:
            application/json:
              schema:
                type: object
                required:
                - state
                properties:
                  state:
                    $ref: '#/components/schemas/GameState'
        '404':
          description: 玩家不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/military/recruit:
    post:
      tags:
      - Military
      summary: 发起征兵
      description: 消耗资源创建征兵队列。队列到期后，后端在游戏状态结算时自动将兵力加入军队并移除该队列。
      operationId: recruitUnits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecruitRequest'
      responses:
        '200':
          description: 征兵已进入队列，返回更新后的游戏状态
          content:
            application/json:
              schema:
                type: object
                required:
                - state
                properties:
                  state:
                    $ref: '#/components/schemas/GameState'
        '400':
          description: 征兵数量无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 玩家或兵种不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 征兵队列已满
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 资源不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/military/recruit/instant:
    post:
      tags:
      - Military
      summary: 极速完成征兵队列
      description: 立即完成指定征兵队列并重新计算后续队列结束时间。金币消耗暂未接入，当前用于开发和 GM 验证。
      operationId: instantCompleteRecruit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstantCompleteRecruitRequest'
      responses:
        '200':
          description: 征兵队列已完成，返回更新后的游戏状态
          content:
            application/json:
              schema:
                type: object
                required:
                - state
                properties:
                  state:
                    $ref: '#/components/schemas/GameState'
        '400':
          description: 参数错误或队列不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 玩家不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/map/npc-cities:
    get:
      tags:
      - Map
      summary: 获取 NPC 城池列表
      description: 按玩家存档读取 NPC 城池状态。若该玩家尚未生成 NPC 城池，或已超过刷新周期，后端会生成并保存新的 NPC 状态。
      operationId: getNpcCities
      parameters:
      - name: playerId
        in: query
        required: true
        description: 玩家存档 ID。
        schema:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
      responses:
        '200':
          description: NPC 城池状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NpcState'
        '404':
          description: 玩家不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/map/npc-cities/refresh:
    post:
      tags:
      - Map
      summary: 手动刷新 NPC 城池
      description: 重新生成该玩家的 NPC 城池列表。金币消耗暂未接入，当前用于开发和 GM 验证。
      operationId: refreshNpcCities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NpcCitiesRefreshRequest'
      responses:
        '200':
          description: 刷新后的 NPC 城池状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NpcState'
        '404':
          description: 玩家不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/map/npc-cities/attack:
    post:
      tags:
      - Map
      summary: 攻击或掠夺 NPC 城池
      description: 扣除出征兵力，执行战斗结算，归还存活兵力，更新 NPC 守军、NPC 资源、玩家资源和最近战报。
      operationId: attackNpcCity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttackNpcRequest'
      responses:
        '200':
          description: 战斗结算结果和更新后的游戏状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttackNpcResponse'
        '400':
          description: 参数错误或未选择出征兵力
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 玩家、NPC 城池或兵种不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 出征兵力不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/map/npc-cities/scout:
    post:
      tags:
      - Map
      summary: 侦查 NPC 城池
      description: 消耗侦察兵，返回目标 NPC 城池完整信息和更新后的游戏状态。
      operationId: scoutNpcCity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScoutNpcRequest'
      responses:
        '200':
          description: 侦查结果和更新后的游戏状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoutNpcResponse'
        '400':
          description: 参数错误或没有可用侦察兵种
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 玩家或 NPC 城池不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 侦察兵数量不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/accounts:
    get:
      tags:
      - Admin
      summary: GM 查看所有注册账号和存档
      operationId: adminListAccounts
      responses:
        '200':
          description: 账号和存档列表
          content:
            application/json:
              schema:
                type: object
                required:
                - accounts
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountSummary'
        '500':
          description: 后端读取失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/players/{playerId}/state:
    get:
      tags:
      - Admin
      summary: GM 查看指定玩家完整状态
      operationId: adminGetPlayerState
      parameters:
      - name: playerId
        in: path
        required: true
        schema:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
      responses:
        '200':
          description: 玩家完整游戏状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '404':
          description: 玩家不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/resources/adjust:
    post:
      tags:
      - Admin
      summary: GM 资源补发 / 扣减
      description: 对指定玩家的资源进行加减调整。正数为补发，负数为扣减（不会低于 0，不会超过容量上限）。
      operationId: adminAdjustResources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustResourcesRequest'
      responses:
        '200':
          description: 调整后的游戏状态
          content:
            application/json:
              schema:
                type: object
                required:
                - state
                properties:
                  state:
                    $ref: '#/components/schemas/GameState'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 玩家不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/balance:
    get:
      tags:
      - Admin
      summary: GM 读取游戏数值配置
      operationId: adminGetBalance
      responses:
        '200':
          description: 当前资源和建筑数值配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceConfig'
    put:
      tags:
      - Admin
      summary: GM 保存游戏数值配置
      operationId: adminUpdateBalance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BalanceConfig'
      responses:
        '200':
          description: 保存后的数值配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceConfig'
        '400':
          description: 配置格式或内容不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/npc-config:
    get:
      tags:
      - Admin
      summary: GM 读取 NPC 城池配置
      description: 读取 NPC 城池生成、刷新、守军、词条和侦查消耗配置。
      operationId: adminGetNpcConfig
      responses:
        '200':
          description: 当前 NPC 城池配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NpcConfig'
    put:
      tags:
      - Admin
      summary: GM 保存 NPC 城池配置
      description: 保存后立即更新后端内存配置。已生成到玩家存档内的 NPC 城池不会自动重刷，需要调用 NPC 刷新接口才会按新配置重新生成。
      operationId: adminUpdateNpcConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NpcConfig'
      responses:
        '200':
          description: 保存后的 NPC 城池配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NpcConfig'
        '400':
          description: 配置格式或内容不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    HealthState:
      type: object
      required:
      - status
      - service
      - version
      - environment
      - time
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: Hero3 API
        version:
          type: string
          example: 0.1.0
        environment:
          type: string
          example: development
        time:
          type: string
          format: date-time
    MetaState:
      type: object
      additionalProperties: true
      example:
        service: Hero3 API
        version: 0.1.0
        environment: development
    BootstrapResponse:
      type: object
      required:
      - gameName
      - modules
      - message
      properties:
        gameName:
          type: string
          example: Hero3
        modules:
          type: array
          items:
            type: string
          example:
          - player
          - city
          - resource
          - military
          - map
          - combat
          - save
        message:
          type: string
          example: Hero3 后端基础服务已就绪，具体玩法逻辑待接入。
    AccountRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
          example: xieyuqi
        password:
          type: string
          format: password
          example: '123456'
    AccountSession:
      type: object
      required:
      - accountId
      - username
      properties:
        accountId:
          type: string
          example: acc_958538e3bc17faf00407ddcc
        username:
          type: string
          example: xieyuqi
    CreatePlayerRequest:
      type: object
      required:
      - accountId
      - nickname
      - faction
      properties:
        accountId:
          type: string
          example: acc_958538e3bc17faf00407ddcc
        nickname:
          type: string
          example: 主公
        faction:
          type: string
          enum:
          - wei
          - shu
          - wu
          example: wei
        generalId:
          type: string
          example: caocao
    AccountSummary:
      type: object
      required:
      - id
      - username
      - createdAt
      - players
      properties:
        id:
          type: string
          example: acc_958538e3bc17faf00407ddcc
        username:
          type: string
          example: xieyuqi
        createdAt:
          type: string
          format: date-time
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerSummary'
    PlayerSummary:
      type: object
      required:
      - id
      - nickname
      - faction
      - updatedAt
      properties:
        id:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
        nickname:
          type: string
          example: 主公
        faction:
          type: string
          example: wei
        updatedAt:
          type: string
          format: date-time
    GameState:
      type: object
      required:
      - player
      - resources
      - resourceProduction
      - resourceSettledAt
      - buildings
      - army
      - recruitQueues
      - mapTargets
      - recentBattleReports
      - unreadMessageCount
      - serverTime
      properties:
        player:
          $ref: '#/components/schemas/Player'
        resources:
          $ref: '#/components/schemas/ResourceState'
        resourceProduction:
          $ref: '#/components/schemas/ResourceProduction'
        resourceSettledAt:
          type: string
          format: date-time
          description: 资源上次由后端权威结算的时间。
        buildings:
          type: array
          items:
            $ref: '#/components/schemas/Building'
        army:
          type: array
          items:
            $ref: '#/components/schemas/ArmyUnit'
        recruitQueues:
          type: array
          items:
            $ref: '#/components/schemas/RecruitQueue'
        npcState:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/NpcState'
        mapTargets:
          type: array
          items:
            $ref: '#/components/schemas/MapTarget'
        recentBattleReports:
          type: array
          items:
            $ref: '#/components/schemas/BattleReport'
        unreadMessageCount:
          type: integer
          example: 0
        serverTime:
          type: string
          format: date-time
    Player:
      type: object
      required:
      - id
      - nickname
      - faction
      properties:
        id:
          type: string
          example: demo-player
        nickname:
          type: string
          example: 主公
        faction:
          type: string
          example: wei
    ResourceState:
      type: object
      required:
      - items
      - capacity
      properties:
        items:
          type: object
          description: 资源当前数量，key 为资源类型，可扩展。
          additionalProperties:
            type: integer
          example:
            wood: 1200
            stone: 900
            iron: 600
            food: 1500
        capacity:
          type: object
          description: 各资源容量上限，key 与资源类型一致。
          additionalProperties:
            type: integer
          example:
            wood: 7500
            stone: 7500
            iron: 7500
            food: 7500
    ResourceProduction:
      type: object
      description: 每小时资源产量，key 为资源类型，可扩展。
      additionalProperties:
        type: integer
      example:
        wood: 84
        stone: 62
        iron: 48
        food: 100
    Building:
      type: object
      required:
      - id
      - type
      - level
      - upgradeEndsAt
      properties:
        id:
          type: string
          example: wood-camp
        type:
          type: string
          example: wood_camp
        level:
          type: integer
          example: 3
        upgradeEndsAt:
          type: string
          nullable: true
          example: null
    ArmyUnit:
      type: object
      required:
      - unitType
      - amount
      properties:
        unitType:
          type: string
          example: infantry
        amount:
          type: integer
          example: 80
    RecruitQueue:
      type: object
      required:
      - id
      - unitType
      - amount
      - endsAt
      properties:
        id:
          type: string
        unitType:
          type: string
        amount:
          type: integer
        endsAt:
          type: string
          format: date-time
    MapTarget:
      type: object
      required:
      - id
      - type
      - level
      - power
      - rewards
      properties:
        id:
          type: string
          example: target-001
        type:
          type: string
          example: bandit_camp
        level:
          type: integer
          example: 1
        power:
          type: integer
          example: 100
        rewards:
          type: object
          additionalProperties:
            type: integer
    BattleReport:
      type: object
      properties:
        id:
          type: string
        targetId:
          type: string
        result:
          type: string
        playerPower:
          type: integer
        enemyPower:
          type: integer
        lostUnits:
          type: object
          additionalProperties:
            type: integer
        rewards:
          type: object
          additionalProperties:
            type: integer
        createdAt:
          type: string
          format: date-time
    BalanceConfig:
      type: object
      required:
      - baseProduction
      - buildings
      properties:
        baseProduction:
          type: object
          additionalProperties:
            type: integer
          example:
            wood: 30
            stone: 30
            iron: 20
            food: 40
        buildings:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/BuildingConfig'
    BuildingConfig:
      type: object
      required:
      - type
      - name
      properties:
        type:
          type: string
          example: wood_camp
        name:
          type: string
          example: 伐木场
        resourceType:
          type: string
          example: wood
        productionByLevel:
          type: array
          items:
            type: integer
          example:
          - 0
          - 18
          - 36
          - 54
        capacityByLevel:
          type: array
          items:
            type: integer
          example:
          - 5000
          - 7500
          - 10000
        upgradeCostByLevel:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: integer
          example:
            '1':
              wood: 50
              stone: 80
              iron: 30
              food: 20
        upgradeSecondsByLevel:
          type: object
          additionalProperties:
            type: integer
          example:
            '1': 30
            '2': 45
    UpgradeBuildingRequest:
      type: object
      required:
      - playerId
      - buildingId
      properties:
        playerId:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
        buildingId:
          type: string
          description: 建筑实例 ID
          example: wood_camp-1
    AdjustResourcesRequest:
      type: object
      required:
      - playerId
      - adjustments
      properties:
        playerId:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
        adjustments:
          type: object
          description: 资源调整量，正数补发，负数扣减。
          additionalProperties:
            type: integer
          example:
            wood: 5000
            iron: -200
    RecruitRequest:
      type: object
      required:
      - playerId
      - unitId
      - amount
      properties:
        playerId:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
        unitId:
          type: string
          description: 兵种配置 ID，按玩家阵营在 units 配置中查找。
          example: infantry
        amount:
          type: integer
          minimum: 1
          example: 10
    InstantCompleteRecruitRequest:
      type: object
      required:
      - playerId
      - queueId
      properties:
        playerId:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
        queueId:
          type: string
          description: 征兵队列 ID。
          example: recruit_a1b2c3d4
    NpcState:
      type: object
      required:
      - cities
      - lastRefreshedAt
      properties:
        cities:
          type: array
          items:
            $ref: '#/components/schemas/NpcCity'
        lastRefreshedAt:
          type: string
          format: date-time
          description: 本轮 NPC 城池生成或刷新时间。
    NpcCity:
      type: object
      required:
      - id
      - name
      - faction
      - tier
      - resources
      - storageCapacity
      - productionPerHour
      - army
      - maxArmy
      - armyRecoveryRate
      - recoveryProfile
      - traits
      - resourceSettledAt
      - armySettledAt
      - generatedAt
      properties:
        id:
          type: string
          example: npc_a1b2c3d4
        name:
          type: string
          example: 黑山营寨
        faction:
          type: string
          enum:
          - wei
          - shu
          - wu
          example: wei
        tier:
          type: string
          enum:
          - small
          - medium
          - large
          - golden
          example: medium
        resources:
          type: object
          additionalProperties:
            type: integer
          example:
            wood: 50000
            stone: 50000
            iron: 50000
            food: 50000
        storageCapacity:
          type: object
          additionalProperties:
            type: integer
          example:
            wood: 320000
            stone: 320000
            iron: 320000
            food: 320000
        productionPerHour:
          type: object
          additionalProperties:
            type: integer
          example:
            wood: 24500
            stone: 24500
            iron: 24500
            food: 24500
        army:
          type: array
          items:
            $ref: '#/components/schemas/ArmyUnit'
        maxArmy:
          type: array
          items:
            $ref: '#/components/schemas/ArmyUnit'
        armyRecoveryRate:
          type: number
          format: double
          description: 每小时恢复守军总量。
          example: 12.5
        recoveryProfile:
          type: string
          example: normal
        traits:
          type: array
          items:
            $ref: '#/components/schemas/NpcTrait'
        resourceSettledAt:
          type: string
          format: date-time
        armySettledAt:
          type: string
          format: date-time
        generatedAt:
          type: string
          format: date-time
    NpcTrait:
      type: object
      required:
      - id
      - name
      - buffs
      properties:
        id:
          type: string
          example: rich
        name:
          type: string
          example: 富矿
        buffs:
          type: object
          additionalProperties:
            type: number
          example:
            resourceMultiplier: 1.2
    NpcConfig:
      type: object
      required:
      - baseProduction
      - baseStorage
      - refreshIntervalHours
      - manualRefreshCostGold
      - goldenAppearRate
      - totalCities
      - tiers
      - recoveryProfiles
      - traitPool
      - cityNames
      - scoutCost
      properties:
        baseProduction:
          type: integer
          minimum: 1
          example: 24500
        baseStorage:
          type: integer
          minimum: 1
          example: 320000
        refreshIntervalHours:
          type: integer
          minimum: 1
          example: 24
        manualRefreshCostGold:
          type: integer
          minimum: 0
          example: 50
        goldenAppearRate:
          type: number
          format: double
          minimum: 0
          maximum: 1
          example: 0.2
        totalCities:
          type: integer
          minimum: 1
          example: 12
        tiers:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/NpcTierConfig'
        recoveryProfiles:
          type: array
          items:
            $ref: '#/components/schemas/NpcRecoveryProfile'
        traitPool:
          type: array
          items:
            $ref: '#/components/schemas/NpcTraitConfig'
        cityNames:
          type: array
          items:
            type: string
          example:
          - 洛阳
          - 长安
          - 成都
        scoutCost:
          type: object
          additionalProperties:
            type: integer
          example:
            small: 5
            medium: 15
            large: 30
            golden: 50
    NpcTierConfig:
      type: object
      required:
      - multiplier
      - armyRange
      - armyTypes
      - traitCount
      - count
      properties:
        multiplier:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
        armyRange:
          $ref: '#/components/schemas/IntRange'
        armyTypes:
          $ref: '#/components/schemas/IntRange'
        traitCount:
          $ref: '#/components/schemas/IntRange'
        count:
          $ref: '#/components/schemas/NpcCountRule'
    IntRange:
      type: object
      required:
      - min
      - max
      properties:
        min:
          type: integer
        max:
          type: integer
    NpcCountRule:
      type: object
      required:
      - guaranteed
      - weight
      properties:
        guaranteed:
          type: integer
          minimum: 0
        weight:
          type: integer
          minimum: 0
    NpcRecoveryProfile:
      type: object
      required:
      - id
      - name
      - armyMultiplier
      - resourceMultiplier
      - weight
      properties:
        id:
          type: string
        name:
          type: string
        armyMultiplier:
          type: number
          format: double
        resourceMultiplier:
          type: number
          format: double
        weight:
          type: integer
          minimum: 0
    NpcTraitConfig:
      type: object
      required:
      - id
      - name
      - buffs
      - weight
      properties:
        id:
          type: string
        name:
          type: string
        buffs:
          type: object
          additionalProperties:
            type: number
        weight:
          type: integer
          minimum: 0
    NpcCitiesRefreshRequest:
      type: object
      required:
      - playerId
      properties:
        playerId:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
    AttackNpcRequest:
      type: object
      required:
      - playerId
      - npcId
      - units
      properties:
        playerId:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
        npcId:
          type: string
          example: npc_a1b2c3d4
        mode:
          type: string
          enum:
          - attack
          - plunder
          default: attack
          description: attack 为攻城，plunder 为掠夺。
        units:
          type: object
          description: 出征兵力，key 为兵种 ID，value 为数量。
          additionalProperties:
            type: integer
            minimum: 1
          example:
            infantry: 50
            cavalry: 20
    AttackNpcResponse:
      type: object
      required:
      - battleReport
      - state
      properties:
        battleReport:
          $ref: '#/components/schemas/BattleReport'
        state:
          $ref: '#/components/schemas/GameState'
    ScoutNpcRequest:
      type: object
      required:
      - playerId
      - npcId
      properties:
        playerId:
          type: string
          example: player_47f23e0eeb08ab50402fedfc
        npcId:
          type: string
          example: npc_a1b2c3d4
    ScoutNpcResponse:
      type: object
      required:
      - npcCity
      - state
      properties:
        npcCity:
          $ref: '#/components/schemas/NpcCity'
        state:
          $ref: '#/components/schemas/GameState'
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: string
          example: player not found
    DeleteResponse:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          example: deleted
